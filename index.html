<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>員工評核系統</title>
  <style>
    body { font-family: sans-serif; display: flex; margin: 0; background: #f4f7f6; }
    nav { width: 220px; background: #0a3d2e; color: white; height: 100vh; padding: 20px; }
    nav div { padding: 15px; cursor: pointer; border-bottom: 1px solid #1a5e4d; }
    nav div:hover { background: #1a5e4d; }
    main { flex: 1; padding: 30px; }
    .card { background: white; padding: 25px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .btn { padding: 10px 20px; cursor: pointer; background: #0a3d2e; color: white; border: none; border-radius: 5px; }
    input { padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    .version { font-size: 12px; color: #888; margin-bottom: 20px; }
  </style>
</head>
<body>

<nav>
  <div class="version">版本: 20260531-04</div>
  <div onclick="showPage('home')">🏠 首頁</div>
  <div onclick="showPage('admin')">⚙️ 管理後台</div>
  <div onclick="showPage('skills')">📊 技能總表</div>
</nav>

<main id="content"></main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAPBXphipNLgAHuqPg0HZ-J8HIqc9hQHc",
    databaseURL: "https://employee-review-system-4a32d-default-rtdb.firebaseio.com",
    projectId: "employee-review-system-4a32d"
  };
  const db = getDatabase(initializeApp(firebaseConfig));

  window.showPage = (page) => {
    const content = document.getElementById('content');
    if (page === 'home') {
      content.innerHTML = `<h1>首頁</h1><img id="displayImg" style="max-width:100%;" src="">`;
      onValue(ref(db, 'homepage/photo'), (s) => document.getElementById('displayImg').src = s.val() || '');
    } else if (page === 'admin') {
      content.innerHTML = `
        <div class="card">
          <h3>📷 照片管理</h3>
          <input type="file" id="photoInput" accept="image/*">
          <button class="btn" onclick="uploadPhoto()">更新首頁照片</button>
        </div>
        <div class="card">
          <h3>👥 員工配置</h3>
          <input type="text" id="ln" placeholder="組長名稱">
          <input type="text" id="ml" placeholder="組員名稱(逗號分隔)">
          <button class="btn" onclick="addTeam()">儲存組別</button>
          <div id="teamList"></div>
        </div>
        <div class="card">
          <h3>🛠️ 技能設定</h3>
          <input type="text" id="sLeader" placeholder="組長名稱">
          <input type="text" id="sMember" placeholder="組員名稱">
          <input type="text" id="sName" placeholder="技能名稱">
          <button class="btn" onclick="addSkill()">新增技能</button>
          <div id="skillList"></div>
        </div>`;
      renderTeams();
      renderSkillsAdmin();
    } else {
      content.innerHTML = `<h1>技能總表</h1><div id="skillTable"></div>`;
      renderSkills();
    }
  };

  window.uploadPhoto = () => {
    const file = document.getElementById('photoInput').files[0];
    const reader = new FileReader();
    reader.onload = e => set(ref(db, 'homepage/photo'), e.target.result).then(() => alert('照片已更新'));
    reader.readAsDataURL(file);
  };

  window.addTeam = () => {
    set(ref(db, 'teams/' + document.getElementById('ln').value), document.getElementById('ml').value).then(() => alert('儲存成功'));
  };

  window.addSkill = () => {
    const l = document.getElementById('sLeader').value;
    const m = document.getElementById('sMember').value;
    const s = document.getElementById('sName').value;
    set(ref(db, `skills/${l}/${m}`), s).then(() => alert('技能已新增'));
  };

  function renderTeams() {
    onValue(ref(db, 'teams'), (s) => {
      const data = s.val() || {};
      let html = `<h4>目前組別配置：</h4>`;
      for (let l in data) {
        html += `<div>${l}: <input id="e_${l}" value="${data[l]}"> <button onclick="saveEditTeam('${l}')">儲存</button></div>`;
      }
      document.getElementById('teamList').innerHTML = html;
    });
  }

  function renderSkillsAdmin() {
    onValue(ref(db, 'skills'), (s) => {
      const data = s.val() || {};
      let html = `<h4>目前技能設定：</h4>`;
      for (let l in data) {
        for (let m in data[l]) {
          html += `<div>${l}-${m}: <input id="e_${l}_${m}" value="${data[l][m]}"> <button onclick="saveEditSkill('${l}','${m}')">儲存</button></div>`;
        }
      }
      document.getElementById('skillList').innerHTML = html;
    });
  }

  window.saveEditTeam = (l) => {
    set(ref(db, 'teams/' + l), document.getElementById('e_' + l).value).then(() => alert('更新成功'));
  };

  window.saveEditSkill = (l, m) => {
    set(ref(db, `skills/${l}/${m}`), document.getElementById(`e_${l}_${m}`).value).then(() => alert('技能更新成功'));
  };

  function renderSkills() {
    onValue(ref(db, 'skills'), (s) => {
      const data = s.val() || {};
      let html = `<table><tr><th>組長</th><th>組員</th><th>技能</th></tr>`;
      for (let l in data) {
        for (let m in data[l]) {
          html += `<tr><td>${l}</td><td>${m}</td><td>${data[l][m]}</td></tr>`;
        }
      }
      document.getElementById('skillTable').innerHTML = html + `</table>`;
    });
  }

  showPage('home');
</script>
</body>
</html>
