<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>員工評核系統 - V34</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; background: #f8fafc; color: #000; font-size: 24px; font-weight: bold; }
    nav { width: 260px; background: #e2e8f0; color: #000; height: 100vh; padding: 20px; border-right: 2px solid #cbd5e1; position: fixed; }
    nav div { padding: 18px; cursor: pointer; border-bottom: 1px solid #cbd5e1; font-weight: bold; font-size: 22px; }
    nav div:hover { background: #cbd5e1; }
    main { flex: 1; padding: 40px; margin-left: 260px; }
    .card { background: white; padding: 30px; border-radius: 15px; margin-bottom: 25px; border: 3px solid #000; color: #000; }
    .card h3 { font-size: 26px; font-weight: bold; margin-top: 0; color: #000; }
    .btn { padding: 12px 24px; cursor: pointer; background: #4f46e5; color: white; border: 3px solid #000; border-radius: 8px; font-weight: bold; font-size: 22px; }
    .btn-action { padding: 10px 16px; margin: 4px; cursor: pointer; border-radius: 5px; border: 2px solid #000; font-weight: bold; font-size: 18px; color: #000; }
    input, select, textarea { padding: 12px; margin: 8px 0; border: 3px solid #000; border-radius: 8px; width: 100%; font-size: 22px; font-weight: bold; color: #000; background: #fff; box-sizing: border-box; }
    .version { font-size: 18px; color: #475569; margin-bottom: 20px; font-weight: bold; }
    .skill-table { width: 100%; border-collapse: collapse; margin-top: 25px; background: white; border: 3px solid #000; font-size: 22px; }
    .skill-table th, .skill-table td { border: 3px solid #000; padding: 16px; text-align: left; color: #000; font-weight: bold; }
    .skill-table th { background: #cbd5e1; text-align: center; font-size: 24px; }
    .gradient-bg { background: linear-gradient(135deg, #e9d5ff, #f5d0fe); color: #000; padding: 40px; border-radius: 20px; border: 3px solid #a855f7; }
    .eval-card { display: inline-block; width: 240px; text-align: center; padding: 20px; border: 3px solid #000; border-radius: 15px; margin: 10px; background: white; color: #000; }
    
    /* 圓形漸層類別 */
    .circle-progress { width: 130px; height: 130px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 15px auto; font-size: 30px; color: #000; font-weight: 900; box-sizing: border-box; }
    .p-0 { border: 10px solid #ef4444; background: #fee2e2; }
    .p-20 { border: 10px solid #f97316; background: #ffedd5; }
    .p-40 { border: 10px solid #eab308; background: #fef9c3; }
    .p-60 { border: 10px solid #3b82f6; background: #dbeafe; }
    .p-80 { border: 10px solid #a855f7; background: #f3e8ff; }
    .p-100 { border: 10px solid #22c55e; background: #dcfce7; }

    /* 有照片的按鈕樣式 */
    .btn-has-photo { border: 4px dashed #ff00ff !important; background: #f5d0fe !important; font-weight: 900 !important; }
  </style>
</head>
<body>

<nav>
  <div class="version">版本: 20260604-34</div>
  <div onclick="showPage('home')">🏠 首頁</div>
  <div onclick="showPage('skills')">📊 技能總表</div>
  <div onclick="showPage('eval')">📊 技能評核進度表</div>
  <div onclick="showPage('6s')">✅ 6S Check</div>
  <div onclick="showPage('admin')">⚙️ 管理後台</div>
</nav>

<main id="content"></main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const db = getDatabase(initializeApp({
    apiKey: "AIzaSyAPBXphipNLgAHuqPg0HZ-J8HIqc9hQHc",
    databaseURL: "https://employee-review-system-4a32d-default-rtdb.firebaseio.com",
    projectId: "employee-review-system-4a32d"
  }));

  window.currentEditData = null;
  // 35. 調整分類底色，將整理(粉紅)與整頓(亮黃)改成不同色系方便觀看
  const categoryColors = { "整理": "#ffdee2", "整頓": "#e0f2fe", "清潔": "#dcfce7", "清掃": "#fff7ed", "素養": "#f3e8ff", "安全": "#fee2e2" };
  const getColor = (cat) => categoryColors[cat] || "#ffffff";

  // 取得進度條圓圈樣式
  const getProgressClass = (score) => {
    if (score === "20%") return "circle-progress p-20";
    if (score === "40%") return "circle-progress p-40";
    if (score === "60%") return "circle-progress p-60";
    if (score === "80%") return "circle-progress p-80";
    if (score === "100%") return "circle-progress p-100";
    return "circle-progress p-0";
  };

  window.showPage = (page) => {
    const content = document.getElementById('content');
    window.currentEditData = null; // 切換頁面時清空編輯暫存
    
    if (page === 'home') {
      content.innerHTML = `<h1>首頁</h1><img id="displayImg" style="max-width:100%; border: 3px solid #000; background:#ccc;" src="">`;
      onValue(ref(db, 'homepage/photo'), (s) => { const img = document.getElementById('displayImg'); if(img) img.src = s.val() || ''; });
    } else if (page === '6s') {
      content.innerHTML = `<h1>6S Check</h1>
        <div style="display: flex; gap: 15px; align-items: center; margin-bottom: 20px;">
          <select id="unitSelect" onchange="render6S()" style="width: auto; min-width: 250px;"><option value="">請選擇課別</option><option value="製造一課">製造一課</option><option value="製造二課">製造二課</option></select>
          <button class="btn" style="background: #10b981;" onclick="downloadCSV()">📊 匯出 CSV 檔</button>
        </div>
        <div id="sixSList"></div><hr><div id="sixSContainer"></div>`;
    } else if (page === 'admin') {
      const password = prompt("請輸入管理員密碼:");
      if (password !== "0000") { alert("密碼錯誤！"); return; }
      content.innerHTML = `
        <div class="card"><h3>📷 照片管理</h3><input type="file" id="photoInput" accept="image/*"><button class="btn" onclick="uploadPhoto()">更新首頁照片</button></div>
        <div class="card"><h3>👥 員工配置</h3><input type="text" id="ln" placeholder="組長名稱"><input type="text" id="ml" placeholder="組員名稱(逗號分隔)"><button class="btn" onclick="addTeam()">儲存新組別</button><hr><div id="teamList"></div></div>
        <div class="card"><h3>🛠️ 技能設定</h3><select id="sLeaderSelect" onchange="updateMemberSelect()"><option value="">選擇組長</option></select><select id="sMemberSelect"><option value="">請先選擇組長</option></select><input type="text" id="sName" placeholder="技能名稱(逗號分隔)"><button class="btn" onclick="addSkill()">新增技能</button><hr><div id="skillEditArea"></div></div>`;
      renderTeams(); loadLeaders();
    } else if (page === 'eval') {
      content.innerHTML = `<h1>💡 技能評核進度表</h1><select id="evalLeaderFilter" onchange="renderEval()"><option value="">請選擇組長</option></select><div id="evalArea"></div>`;
      setupEvalFilter();
    } else {
      content.innerHTML = `<div class="gradient-bg"><h1>📊 技能總表</h1><select id="leaderFilter" onchange="renderSkills()"><option value="">請選擇組長</option></select><div id="skillTable"></div></div>`;
      setupLeaderFilter();
    }
  };

  const compressImg = (file, callback) => {
    if(!file) return callback(null);
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const scale = Math.min(1024 / img.width, 1); // 38. 提高解析度至1024寬度，品質拉高
        canvas.width = img.width * scale; canvas.height = img.height * scale;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        callback(canvas.toDataURL('image/jpeg', 0.85)); // 提升至0.85清晰度
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  };

  window.render6S = () => {
    const unit = document.getElementById('unitSelect').value;
    const container = document.getElementById('sixSContainer');
    const listDiv = document.getElementById('sixSList');
    if(!unit) { listDiv.innerHTML = ''; container.innerHTML = ''; return; }
    
    onValue(ref(db, `6s/${unit}`), (s) => {
      const data = s.val() || {};
      // 34. 編輯與表格資料上下顛倒：這裡最上方放表格資料
      let html = `<table class="skill-table"><tr><th>分類</th><th style="text-align:left;">項目</th><th>分數</th><th style="text-align:left;">現況說明</th><th style="text-align:left;">改善方式</th><th>善前</th><th>善後</th><th>操作</th></tr>`;
      let total = 0;
      for(let key in data) {
        total += parseInt(data[key].score) || 0;
        const color = getColor(data[key].cat);
        
        // 33. 設計有照片的查看按鈕樣式不一樣
        const beforeBtnClass = data[key].before ? "btn-action btn-has-photo" : "btn-action";
        const afterBtnClass = data[key].after ? "btn-action btn-has-photo" : "btn-action";

        html += `<tr style="background:${color};">
          <td>${data[key].cat}</td>
          <td style="text-align:left;">${data[key].item}</td>
          <td style="text-align:center;">${data[key].score}</td>
          <td style="text-align:left;">${data[key].note || ''}</td>
          <td style="text-align:left;">${data[key].improve || ''}</td>
          <td style="text-align:center;">${data[key].before ? `<button class="${beforeBtnClass}" style="background:#f0abfc" onclick="viewImg('${data[key].before}')">📷查看(圖)</button>` : '無'}</td>
          <td style="text-align:center;">${data[key].after ? `<button class="${afterBtnClass}" style="background:#7dd3fc" onclick="viewImg('${data[key].after}')">📷查看(圖)</button>` : '無'}</td>
          <td style="text-align:center;">
            <button class="btn-action" style="background:#fef08a" onclick="edit6S('${key}',${JSON.stringify(data[key]).replace(/"/g, '&quot;')})">編輯</button>
            <button class="btn-action" style="background:#fca5a5" onclick="del6S('${unit}','${key}')">刪除</button>
          </td></tr>`;
      }
      html += `<tr><td colspan="2" style="text-align:center;"><b>總分計</b></td><td style="text-align:center;"><b>${total}</b></td><td colspan="5"></td></tr></table>`;
      listDiv.innerHTML = html;
    });

    // 34. 編輯與表格資料上下顛倒：輸入框放在表格下方
    container.innerHTML = `<div class="card" style="border-color:#ef4444; margin-top:30px;"><h3>資料編輯 / 新增資料區 (${unit})</h3>
      <input type="text" id="cat" placeholder="分類 (例如: 整理、整頓...)"> 
      <input type="text" id="item" placeholder="確認項目"> 
      <input type="number" id="score" placeholder="評分">
      <textarea id="note" placeholder="現況說明"></textarea> 
      <textarea id="improve" placeholder="改善方式"></textarea>
      <div style="margin:15px 0; font-size:20px;">善前照片: <input type="file" id="beforeImg" accept="image/*"></div>
      <div style="margin:15px 0; font-size:20px;">善後照片: <input type="file" id="afterImg" accept="image/*"></div>
      <button class="btn" style="background:#ef4444" onclick="save6S('${unit}')">儲存變更紀錄</button></div>`;
  };

  // 37. 找回並確保儲存成功會跳出成功效果
  window.save6S = (unit) => {
    const cat = document.getElementById('cat').value;
    const item = document.getElementById('item').value;
    const score = document.getElementById('score').value;
    const note = document.getElementById('note').value;
    const improve = document.getElementById('improve').value;
    
    if(!cat || !item) { alert('請填寫分類與項目！'); return; }

    const key = window.currentEditData ? window.currentEditData.key : Date.now();
    const oldB = window.currentEditData ? window.currentEditData.before : "";
    const oldA = window.currentEditData ? window.currentEditData.after : "";
    
    compressImg(document.getElementById('beforeImg').files[0], (b64b) => {
      compressImg(document.getElementById('afterImg').files[0], (b64a) => {
        set(ref(db, `6s/${unit}/${key}`), { 
          cat, item, score, note, improve, 
          before: b64b || oldB || "", 
          after: b64a || oldA || "" 
        }).then(() => {
          window.currentEditData = null; 
          alert('🎉 修改暨儲存成功！資料已同步雲端！');
          render6S();
        }).catch(err => alert('儲存失敗: ' + err));
      });
    });
  };

  window.edit6S = (k, data) => {
    window.currentEditData = {key: k, ...data};
    document.getElementById('cat').value = data.cat || '';
    document.getElementById('item').value = data.item || '';
    document.getElementById('score').value = data.score || '';
    document.getElementById('note').value = data.note || '';
    document.getElementById('improve').value = data.improve || '';
    // 滾動到下方的編輯區
    document.getElementById('sixSContainer').scrollIntoView({ behavior: 'smooth' });
  };

  window.del6S = (unit, key) => { 
    if(confirm('確定要刪除此項紀錄嗎?')) {
      remove(ref(db, `6s/${unit}/${key}`)).then(() => alert('資料已成功刪除！')); 
    } 
  };
  
  window.viewImg = (src) => { 
    const win = window.open("", "_blank", "width=900,height=700"); 
    win.document.write(`<div style="display:flex; justify-content:center; align-items:center; height:100vh; background:#000; margin:0;">
      <img src="${src}" style="max-width:95%; max-height:95%; object-fit:contain; border:3px solid #fff;"></div>`); 
  };

  // 39. 下載 CSV 檔案功能 (僅文字)
  window.downloadCSV = () => {
    const unit = document.getElementById('unitSelect').value;
    if(!unit) { alert('請先選擇課別再進行匯出！'); return; }
    
    onValue(ref(db, `6s/${unit}`), (s) => {
      const data = s.val() || {};
      if(Object.keys(data).length === 0) { alert('目前無資料可供匯出！'); return; }
      
      let csvContent = "\uFEFF"; // 避免 Excel 開啟亂碼 (BOM)
      csvContent += "課別,分類,確認項目,評分,現況說明,改善方式\n";
      
      for(let key in data) {
        let row = [
          unit,
          data[key].cat || '',
          data[key].item || '',
          data[key].score || '0',
          data[key].note || '',
          data[key].improve || ''
        ].map(text => `"${String(text).replace(/"/g, '""')}"`).join(",");
        csvContent += row + "\n";
      }
      
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.setAttribute("download", `${unit}_6S_Check_Report.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }, { onlyOnce: true });
  };

  function setupEvalFilter() { onValue(ref(db, 'teams'), (s) => { const filter = document.getElementById('evalLeaderFilter'); if(filter) filter.innerHTML = '<option value="">請選擇組長</option>' + Object.keys(s.val() || {}).map(l => `<option value="${l}">${l}</option>`).join(''); }); }
  
  // 36. 圓形百分比表顯示
  window.renderEval = () => {
    const leader = document.getElementById('evalLeaderFilter').value;
    if(!leader) return;
    onValue(ref(db, 'teams/' + leader), (s) => {
      const members = (s.val() || "").split(',');
      onValue(ref(db, 'evaluations/' + leader), (snap) => {
        const scores = snap.val() || {};
        let html = `<h3>${leader}組 成員評核進度：</h3>`;
        members.forEach(m => {
          if(!m.trim()) return;
          const score = scores[m.trim()] || "0%";
          html += `<div class="eval-card">
            <div>👤 ${m.trim()}</div>
            <div class="${getProgressClass(score)}"><span>${score}</span></div>
            <select id="s_${m.trim()}">${['0%','20%','40%','60%','80%','100%'].map(v=>`<option value="${v}" ${score==v?'selected':''}>${v}</option>`).join('')}</select>
            <button class="btn" style="margin-top:10px; padding:6px 12px; font-size:16px;" onclick="saveScore('${leader}','${m.trim()}')">儲存歷史</button>
          </div>`;
        });
        document.getElementById('evalArea').innerHTML = html;
      });
    });
  };
  window.saveScore = (l, m) => set(ref(db, `evaluations/${l}/${m}`), document.getElementById('s_'+m).value).then(() => alert('🎉 評核分數已成功儲存！'));

  function loadLeaders() { onValue(ref(db, 'teams'), (s) => { const sl = document.getElementById('sLeaderSelect'); if(sl) sl.innerHTML = '<option value="">選擇組長</option>' + Object.keys(s.val() || {}).map(l => `<option value="${l}">${l}</option>`).join(''); }); }
  window.updateMemberSelect = () => {
    const leader = document.getElementById('sLeaderSelect').value;
    onValue(ref(db, 'teams/' + leader), (s) => { const sm = document.getElementById('sMemberSelect'); if(sm) sm.innerHTML = (s.val()||"").split(',').map(m=>`<option value="${m.trim()}">${m.trim()}</option>`).join(''); });
    renderSkillsAdminByLeader(leader);
  };
  
  window.uploadPhoto = () => { const f = document.getElementById('photoInput').files[0]; const r = new FileReader(); r.onload = e => set(ref(db, 'homepage/photo'), e.target.result).then(() => alert('🎉 首頁照片更新儲存成功！')); if(f) r.readAsDataURL(f); };
  window.addTeam = () => set(ref(db, 'teams/' + document.getElementById('ln').value), document.getElementById('ml').value).then(() => alert('🎉 新組別人員配置儲存成功！'));
  window.addSkill = () => set(ref(db, `skills/${document.getElementById('sLeaderSelect').value}/${document.getElementById('sMemberSelect').value}`), document.getElementById('sName').value).then(() => alert('🎉 成員技能設定新增成功！'));
  
  window.saveAdminTeam = (l) => { const val = document.getElementById('e_'+l).value; set(ref(db, `teams/${l}`), val).then(() => alert(`🎉 [${l}組] 人員配置修改並儲存成功！`)); };
  window.saveAdminSkill = (leader, member) => { const val = document.getElementById(`es_${member}`).value; set(ref(db, `skills/${leader}/${member}`), val).then(() => alert(`🎉 [${member}] 技能清單修改並儲存成功！`)); };

  function renderTeams() { 
    onValue(ref(db, 'teams'), (s) => { 
        let h = '<h4>目前人員配置編輯：</h4>'; 
        for(let l in s.val()||{}) {
            h += `<div style="margin-bottom:15px; border-bottom:1px solid #ddd; padding-bottom:10px;"><b>${l}組：</b><input id="e_${l}" value="${s.val()[l]}"><button class="btn-action" style="background:#a7f3d0;" onclick="saveAdminTeam('${l}')">儲存修改</button></div>`; 
        }
        const tl = document.getElementById('teamList'); if(tl) tl.innerHTML = h; 
    }); 
  }
  
  function renderSkillsAdminByLeader(leader) { 
    onValue(ref(db, `skills/${leader}`), (s) => { 
        let h = `<h4>${leader}組 技能清單編輯：</h4>`; 
        for(let m in s.val()||{}) {
            h += `<div style="margin-bottom:15px; border-bottom:1px solid #ddd; padding-bottom:10px;"><b>${m}：</b><input id="es_${m}" value="${s.val()[m]}"><button class="btn-action" style="background:#a7f3d0;" onclick="saveAdminSkill('${leader}','${m}')">儲存修改</button></div>`; 
        }
        const sa = document.getElementById('skillEditArea'); if(sa) sa.innerHTML = h; 
    }); 
  }
  
  function setupLeaderFilter() { onValue(ref(db, 'teams'), (s) => { const lf = document.getElementById('leaderFilter'); if(lf) lf.innerHTML = '<option value="">請選擇組長</option>' + Object.keys(s.val()||{}).map(l => `<option value="${l}">${l}</option>`).join(''); }); }
  
  // 32. 技能總表加總每個人 "V" 的欄位
  window.renderSkills = () => {
    const leader = document.getElementById('leaderFilter').value;
    if(!leader) return;
    onValue(ref(db, `skills/${leader}`), (s) => {
      const data = s.val() || {};
      let skills = new Set(); Object.values(data).forEach(v => v.split(',').forEach(sk => { if(sk.trim()) skills.add(sk.trim()); }));
      let h = `<table class="skill-table"><tr><th>組員</th>` + Array.from(skills).map(sk => `<th>${sk}</th>`).join('') + `<th style="background:#bae6fd; text-align:center;">取得技能總數 (V)</th></tr>`;
      for(let m in data) {
        let count = 0;
        let rowHtml = `<tr><td>${m}</td>` + Array.from(skills).map(sk => { 
          if(data[m].includes(sk)){ 
            count++; 
            return '<td style="text-align:center; color:#22c55e; font-size:26px;">✓</td>'; 
          } 
          return '<td></td>'; 
        }).join('') + `<td style="text-align:center; background:#f0f9ff; font-size:26px; color:#0369a1;">${count} 個</td></tr>`;
        h += rowHtml;
      }
      const st = document.getElementById('skillTable'); if(st) st.innerHTML = h + '</table>';
    });
  };
  
  showPage('home');
</script>
</body>
</html>
