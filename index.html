  const compressImg = (file, callback) => {
    if(!file) return callback(null);
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const scale = Math.min(1024 / img.width, 1); 
        canvas.width = img.width * scale; canvas.height = img.height * scale;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        callback(canvas.toDataURL('image/jpeg', 0.85));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  };

  window.recalcTotal = () => {
    const scoreInputs = document.querySelectorAll('.inline-score-field');
    let total = 0;
    scoreInputs.forEach(input => { total += parseInt(input.value) || 0; });
    const totalDisplay = document.getElementById('6sTotalScoreDisplay');
    if (totalDisplay) { totalDisplay.innerText = total; }
  };

  window.render6S = () => {
    const unit = document.getElementById('unitSelect').value;
    const container = document.getElementById('sixSContainer');
    const listDiv = document.getElementById('sixSList');
    if(!unit) { listDiv.innerHTML = ''; container.innerHTML = ''; return; }
    
    onValue(ref(db, `6s/${unit}`), (s) => {
      const rawData = s.val() || {};
      let dataArray = [];
      for(let key in rawData) { dataArray.push({ key: key, ...rawData[key] }); }
      dataArray.sort((a, b) => getSortWeight(a.cat) - getSortWeight(b.cat));

      let html = `<table class="skill-table">
        <tr>
          <th class="col-cat">分類</th>
          <th style="text-align:left; width: 26%;">項目</th>
          <th class="col-score">分數</th>
          <th style="text-align:left; width: 22%;">現況說明</th>
          <th style="text-align:left; width: 22%;">改善方式</th>
          <th style="width: 7%;">善前</th>
          <th style="width: 7%;">善後</th>
          <th class="col-action">操作</th>
        </tr>`;
      let total = 0;
      
      dataArray.forEach((itemData) => {
        total += parseInt(itemData.score) || 0;
        const color = getColor(itemData.cat);
        const key = itemData.key;
        
        const beforeBtnClass = itemData.before ? "btn-action btn-has-photo" : "btn-action";
        const afterBtnClass = itemData.after ? "btn-action btn-has-photo" : "btn-action";

        html += `<tr style="background:${color};">
          <td class="col-cat"><input type="text" id="inline_cat_${key}" class="table-input" value="${itemData.cat || ''}" style="text-align:center; padding: 4px;"></td>
          <td><input type="text" id="inline_item_${key}" class="table-input" style="text-align:left;" value="${itemData.item || ''}"></td>
          <td class="col-score"><input type="number" id="inline_score_${key}" class="table-input inline-score-field" style="text-align:center; padding: 4px;" value="${itemData.score || '0'}" oninput="recalcTotal()"></td>
          <td><textarea id="inline_note_${key}" class="table-input" rows="2" style="text-align:left; resize:vertical;">${itemData.note || ''}</textarea></td>
          <td><textarea id="inline_improve_${key}" class="table-input" rows="2" style="text-align:left; resize:vertical;">${itemData.improve || ''}</textarea></td>
          <td style="text-align:center;">
            ${itemData.before ? `<button class="${beforeBtnClass}" style="background:#f0abfc; padding: 6px;" onclick="viewImg('${itemData.before}')">📷圖</button>` : '無'}
            <input type="file" id="inline_file_b_${key}" accept="image/*" style="font-size:11px; width:100%; margin-top:5px; padding:0; border:none; background:transparent;">
          </td>
          <td style="text-align:center;">
            ${itemData.after ? `<button class="${afterBtnClass}" style="background:#7dd3fc; padding: 6px;" onclick="viewImg('${itemData.after}')">📷圖</button>` : '無'}
            <input type="file" id="inline_file_a_${key}" accept="image/*" style="font-size:11px; width:100%; margin-top:5px; padding:0; border:none; background:transparent;">
          </td>
          <td class="col-action">
            <button class="btn-action btn-action-sm" style="background:#86efac;" onclick="saveInline6S('${unit}', '${key}', '${itemData.before || ''}', '${itemData.after || ''}')" title="儲存">💾</button>
            <button class="btn-action btn-action-sm" style="background:#fca5a5;" onclick="del6S('${unit}','${key}')" title="刪除">🗑️</button>
          </td>
        </tr>`;
      });
      
      html += `<tr><td colspan="2" style="text-align:center;"><b>總分計</b></td><td style="text-align:center;"><b id="6sTotalScoreDisplay">${total}</b></td><td colspan="5"></td></tr></table>`;
      listDiv.innerHTML = html;
    });

    container.innerHTML = `<div class="card" style="border-color:#ef4444; margin-top:30px;"><h3>➕ 新增全新項目 (${unit})</h3>
      <input type="text" id="cat" placeholder="分類 (例如: 整理、整頓、作法、紀律...)"> 
      <input type="text" id="item" placeholder="確認項目"> 
      <input type="number" id="score" placeholder="評分">
      <textarea id="note" placeholder="現況說明"></textarea> 
      <textarea id="improve" placeholder="改善方式"></textarea>
      <div style="margin:15px 0; font-size:22px;">善前照片: <input type="file" id="beforeImg" accept="image/*"></div>
      <div style="margin:15px 0; font-size:22px;">善後照片: <input type="file" id="afterImg" accept="image/*"></div>
      <button class="btn" style="background:#ef4444" onclick="save6S('${unit}')">新增一筆紀錄</button></div>`;
  };

  window.saveInline6S = (unit, key, existingBefore, existingAfter) => {
    const cat = document.getElementById(`inline_cat_${key}`).value;
    const item = document.getElementById(`inline_item_${key}`).value;
    const score = document.getElementById(`inline_score_${key}`).value;
    const note = document.getElementById(`inline_note_${key}`).value;
    const improve = document.getElementById(`inline_improve_${key}`).value;
    
    if(!cat || !item) { alert('分類與項目不能留空！'); return; }
    const fileB = document.getElementById(`inline_file_b_${key}`).files[0];
    const fileA = document.getElementById(`inline_file_a_${key}`).files[0];

    compressImg(fileB, (b64b) => {
      compressImg(fileA, (b64a) => {
        set(ref(db, `6s/${unit}/${key}`), {
          cat: cat, item: item, score: score, note: note, improve: improve,
          before: b64b || existingBefore || "", after: b64a || existingAfter || ""
        }).then(() => {
          alert('🎉 格子內容修改成功！資料已即時發送至雲端並重新排料！');
          render6S();
        }).catch(err => alert('儲存失敗: ' + err));
      });
    });
  };

  window.save6S = (unit) => {
    const cat = document.getElementById('cat').value;
    const item = document.getElementById('item').value;
    const score = document.getElementById('score').value;
    const note = document.getElementById('note').value;
    const improve = document.getElementById('improve').value;
    
    if(!cat || !item) { alert('請填寫分類與項目！'); return; }
    const key = Date.now();
    
    compressImg(document.getElementById('beforeImg').files[0], (b64b) => {
      compressImg(document.getElementById('afterImg').files[0], (b64a) => {
        set(ref(db, `6s/${unit}/${key}`), { 
          cat, item, score, note, improve, before: b64b || "", after: b64a || "" 
        }).then(() => {
          alert('🎉 新項目儲存成功！資料已同步雲端且分類重排！');
          render6S();
        }).catch(err => alert('儲存失敗: ' + err));
      });
    });
  };

  window.del6S = (unit, key) => { if(confirm('確定要刪除此項紀錄嗎?')) { remove(ref(db, `6s/${unit}/${key}`)).then(() => alert('資料已成功刪除！')); } };
  window.viewImg = (src) => { 
    const win = window.open("", "_blank", "width=900,height=700"); 
    win.document.write(`<div style="display:flex; justify-content:center; align-items:center; height:100vh; background:#000; margin:0;"><img src="${src}" style="max-width:95%; max-height:95%; object-fit:contain; border:3px solid #fff;"></div>`); 
  };

  window.downloadCSV = () => {
    const unit = document.getElementById('unitSelect').value;
    if(!unit) { alert('請先選擇課別再進行匯出！'); return; }
    onValue(ref(db, `6s/${unit}`), (s) => {
      const rawData = s.val() || {};
      if(Object.keys(rawData).length === 0) { alert('目前無資料可供匯出！'); return; }
      let dataArray = [];
      for(let key in rawData) { dataArray.push(rawData[key]); }
      dataArray.sort((a, b) => getSortWeight(a.cat) - getSortWeight(b.cat));
      
      let csvContent = "\uFEFF" + "課別,分類,確認項目,評分,現況說明,改善方式\n";
      dataArray.forEach((rowObj) => {
        let row = [unit, rowObj.cat || '', rowObj.item || '', rowObj.score || '0', rowObj.note || '', rowObj.improve || ''].map(text => `"${String(text).replace(/"/g, '""')}"`).join(",");
        csvContent += row + "\n";
      });
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.setAttribute("download", `${unit}_6S_Check_Report.csv`);
      document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }, { onlyOnce: true });
  };

  function setupEvalFilter() { onValue(ref(db, 'teams'), (s) => { const filter = document.getElementById('evalLeaderFilter'); if(filter) filter.innerHTML = '<option value="">請選擇組長</option>' + Object.keys(s.val() || {}).map(l => `<option value="${l}">${l}</option>`).join(''); }); }

    onValue(ref(db, 'teams/' + leader), (s) => {
      const members = (s.val() || "").split(',');
      onValue(ref(db, 'evaluations/' + leader), (snap) => {
        const scores = snap.val() || {};
        let html = `<h3>${leader}組 成員評核進度：</h3>`;
        members.forEach(m => {
          if(!m.trim()) return;
          const score = scores[m.trim()] || "0%";

            <div class="${getProgressClass(score)}"><span>${score}</span></div>
            <select id="s_${m.trim()}">${['0%','20%','40%','60%','80%','100%'].map(v=>`<option value="${v}" ${score==v?'selected':''}>${v}</option>`).join('')}</select>

          </div>`;

      });

  window.saveScore = (l, m) => set(ref(db, `evaluations/${l}/${m}`), document.getElementById('s_'+m).value).then(() => alert('🎉 評核分數已成功儲存！'));

    renderSkillsAdminByLeader(leader);
  };
  
  window.uploadPhoto = () => { const f = document.getElementById('photoInput').files[0]; const r = new FileReader(); r.onload = e => set(ref(db, 'homepage/photo'), e.target.result).then(() => alert('🎉 首頁照片更新儲存成功！')); if(f) r.readAsDataURL(f); };
  window.addTeam = () => set(ref(db, 'teams/' + document.getElementById('ln').value), document.getElementById('ml').value).then(() => alert('🎉 新組別人員配置儲存成功！'));
  
  window.addSkill = () => {
    const leader = document.getElementById('sLeaderSelect').value;
    const member = document.getElementById('sMemberSelect').value;
    const skillsInput = document.getElementById('sName').value;
    const type = document.querySelector('input[name="skillType"]:checked').value;
    if(!leader || !member || !skillsInput) { alert('請完整選擇組長、組員並輸入技能名稱！'); return; }

    let suffix = "";
    if (type === 'master') suffix = "__master";
    if (type === 'half') suffix = "__half";

    const newSkillsArr = skillsInput.split(',').map(sk => { const clean = sk.trim(); return suffix ? `${clean}${suffix}` : clean; }).filter(sk => sk);
    onValue(ref(db, `skills/${leader}/${member}`), (snapshot) => {
      let currentVal = snapshot.val() || "";
      let currentArr = currentVal.split(',').map(s => s.trim()).filter(s => s);
      newSkillsArr.forEach(ns => { if(!currentArr.includes(ns)) { currentArr.push(ns); } });
      set(ref(db, `skills/${leader}/${member}`), currentArr.join(',')).then(() => { alert('🎉 成員技能設定新增成功！'); renderSkillsAdminByLeader(leader); });
    }, { onlyOnce: true });
  };
  
  window.saveSymbols = () => {
    const normal = document.getElementById('symNormal').value || "✓";
    const half = document.getElementById('symHalf').value || "◭";
    const master = document.getElementById('symMaster').value || "⭐";
    set(ref(db, 'settings/symbols'), { normal, half, master }).then(() => { alert('🎉 技能總表顯示符號修改成功！已即時發送至雲端。'); });
  };

  window.saveAdminTeam = (l) => { const val = document.getElementById('e_'+l).value; set(ref(db, `teams/${l}`), val).then(() => alert(`🎉 [${l}組] 人員配置修改並儲存成功！`)); };
  window.saveAdminSkill = (leader, member) => { const val = document.getElementById(`es_${member}`).value; set(ref(db, `skills/${leader}/${member}`), val).then(() => alert(`🎉 [${member}] 技能清單修改並儲存成功！`)); };

  function renderTeams() { 
    onValue(ref(db, 'teams'), (s) => { 
        let h = '<h4>目前人員配置編輯：</h4>'; 
        for(let l in s.val()||{}) { h += `<div style="margin-bottom:15px; border-bottom:1px solid #ddd; padding-bottom:10px;"><b>${l}組：</b><input id="e_${l}" value="${s.val()[l]}"><button class="btn-action" style="background:#a7f3d0;" onclick="saveAdminTeam('${l}')">儲存修改</button></div>`; }

  function renderSkillsAdminByLeader(leader) { 
    onValue(ref(db, `skills/${leader}`), (s) => { 
        let h = `<h4>${leader}組 技能清單編輯：</h4>`; 
        for(let m in s.val()||{}) { h += `<div style="margin-bottom:15px; border-bottom:1px solid #ddd; padding-bottom:10px;"><b>${m}：</b><input id="es_${m}" value="${s.val()[m]}"><button class="btn-action" style="background:#a7f3d0;" onclick="saveAdminSkill('${leader}','${m}')">儲存修改</button></div>`; }

  function setupLeaderFilter() { onValue(ref(db, 'teams'), (s) => { const lf = document.getElementById('leaderFilter'); if(lf) lf.innerHTML = '<option value="">請選擇組長</option>' + Object.keys(s.val()||{}).map(l => `<option value="${l}">${l}</option>`).join(''); }); }
  
  window.renderSkills = () => {
    const leader = document.getElementById('leaderFilter').value;
    if(!leader) return;
    onValue(ref(db, `skills/${leader}`), (s) => {
      const data = s.val() || {};
      let skills = new Set(); 
      Object.values(data).forEach(v => v.split(',').forEach(sk => { 
        let clean = sk.trim().replace('__master', '').replace('__half', ''); 
        if(clean) skills.add(clean); 
      }));
      const skillsArray = Array.from(skills);
      let skillCounts = new Array(skillsArray.length).fill(0);

      let h = `<table class="skill-table"><tr><th>組員</th>` + skillsArray.map(sk => `<th>${sk}</th>`).join('') + `<th style="background:#bae6fd; text-align:center;">取得技能總數 (V)</th></tr>`;
      for(let m in data) {
        let count = 0; let memberSkills = data[m].split(',').map(x => x.trim());
        let rowHtml = `<tr><td>${m}</td>` + skillsArray.map((sk, idx) => { 
          const hasNormal = memberSkills.includes(sk); 
          const hasMaster = memberSkills.includes(`${sk}__master`);
          const hasHalf = memberSkills.includes(`${sk}__half`);
          
          if(hasNormal || hasMaster || hasHalf){ 
            count++; skillCounts[idx]++; 
            let displaySymbol = globalSymbols.normal;
            let displayColor = "#22c55e"; 
            if(hasMaster) { displaySymbol = globalSymbols.master; displayColor = "#a855f7"; }
            if(hasHalf) { displaySymbol = globalSymbols.half; displayColor = "#ef4444"; } 
            
            return `<td style="text-align:center; color:${displayColor}; font-size:26px;">${displaySymbol}</td>`; 
          } 
          return '<td></td>'; 
        }).join('') + `<td style="text-align:center; background:#f0f9ff; font-size:26px; color:#0369a1;">${count} 個</td></tr>`;
        h += rowHtml;
      }
      let totalRowHtml = `<tr style="background:#fef08a;"><td style="color:#ef4444; font-weight:900;">技能總人數</td>`;
      skillCounts.forEach(count => { totalRowHtml += `<td style="text-align:center; color:#ef4444; font-weight:900; font-size:24px;">${count} 人</td>`; });
      totalRowHtml += `<td style="background:#fef08a;"></td></tr>`;
      h += totalRowHtml;
      const st = document.getElementById('skillTable'); if(st) st.innerHTML = h + '</table>';
    });
  };

    const score = parseInt(document.getElementById('pfScore').value);
    const recorder = document.getElementById('pfRecorder').value;

    const key = window.currentEditPfKey || Date.now();

    const doSave = (b64Photo) => {
      set(ref(db, `performance_records/${key}`), {

  window.renderPerformance = () => {
    const filterL = document.getElementById('filterLeader').value;
    const filterM = document.getElementById('filterMember').value;

      let filteredData = dataArray.filter(item => {
        if(filterL && item.leader !== filterL) return false;
        if(filterM && item.name !== filterM) return false;

      filteredData.forEach(item => { calcTotalScore += parseInt(item.score) || 0; });

          html += `<tr style="${bgStyle}">
            <td><input type="date" id="pf_inline_date_${k}" class="table-input" value="${item.date || ''}"></td>
            <td style="text-align:center;">${item.leader || ''}</td>

            <td><textarea id="pf_inline_desc_${k}" class="table-input" rows="2" style="text-align:left; resize:vertical;">${item.contentDesc || ''}</textarea></td>
            <td><input type="text" id="pf_inline_recorder_${k}" class="table-input" value="${item.recorder || ''}"></td>
            <td style="text-align:center;">
              ${item.photo ? `<button class="${photoBtnClass}" style="padding:4px 8px; font-size:18px;" onclick="viewImg('${item.photo}')">📷 檢視</button>` : '<span style="font-size:18px;color:#475569;">無照片</span>'}
              <input type="file" id="pf_inline_file_${k}" accept="image/*" style="font-size:11px; width:100%; margin-top:5px; padding:0; border:none; background:transparent;">
            </td>
            <td style="text-align:center;">
              <button class="btn-action btn-action-sm" style="background:#86efac; display:block; width:95%; margin:4px auto;" onclick="saveInlinePerformance('${k}', '${item.leader}', '${item.name}', '${item.photo || ''}')" title="同步格子內容">💾 儲存</button>
              <button class="btn-action btn-action-sm" style="background:#fde047; display:block; width:95%; margin:4px auto;" onclick="loadToTopPerformanceEditor('${k}', '${item.leader}', '${item.name}', '${item.date}', '${item.score}', '${item.recorder}', \`${item.contentDesc || ''}\`, '${item.photo || ''}')" title="拉到上方編輯">✏️ 修改</button>
              <button class="btn-action btn-action-sm" style="background:#fca5a5; display:block; width:95%; margin:4px auto;" onclick="deletePerformanceRecord('${k}')" title="刪除紀錄">🗑️</button>

  window.saveInlinePerformance = (key, leader, name, existingPhoto) => {
    const uDate = document.getElementById(`pf_inline_date_${key}`).value;
    const uScore = parseInt(document.getElementById(`pf_inline_score_${key}`).value);
    const uRecorder = document.getElementById(`pf_inline_recorder_${key}`).value;
    const uDesc = document.getElementById(`pf_inline_desc_${key}`).value;
    const fileEl = document.getElementById(`pf_inline_file_${key}`).files[0];

      set(ref(db, `performance_records/${key}`), {

  window.loadToTopPerformanceEditor = (key, leader, name, date, score, recorder, contentDesc, photo) => {

      const pfMember = document.getElementById('pfMemberSelect');
      if(pfMember) {
        const members = (s.val() || "").split(',').map(m => m.trim()).filter(m => m);
        pfMember.innerHTML = members.map(m => `<option value="${m}">${m}</option>`).join('');
        pfMember.value = name;
      }

    document.getElementById('pfDate').value = date;
    document.getElementById('pfScore').value = score;
    document.getElementById('pfRecorder').value = recorder;
    document.getElementById('pfContentDesc').value = contentDesc;

  };

  window.downloadPerformanceCSV = () => {
    const filterL = document.getElementById('filterLeader').value;
    const filterM = document.getElementById('filterMember').value;

    onValue(ref(db, 'performance_records'), (snapshot) => {
      const rawData = snapshot.val() || {};
      let dataArray = [];
      for(let k in rawData) { dataArray.push(rawData[k]); }
      dataArray.sort((a, b) => b.key - a.key);

      let filteredData = dataArray.filter(item => {
        if(filterL && item.leader !== filterL) return false;
        if(filterM && item.name !== filterM) return false;
        return true;
      });

      if(filteredData.length === 0) { alert('目前無符合篩選條件的績效資料可供匯出！'); return; }

      let csvContent = "\uFEFF" + "記錄日期,組長,人員姓名,績效分數,內容說明敘述,記錄人員\n";
      filteredData.forEach((rowObj) => {
        let row = [
          rowObj.date || '', rowObj.leader || '', rowObj.name || '', rowObj.score || '0', rowObj.contentDesc || '', rowObj.recorder || ''
        ].map(text => `"${String(text).replace(/"/g, '""')}"`).join(",");
        csvContent += row + "\n";
      });

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.setAttribute("download", `平日績效紀錄報表_${Date.now()}.csv`);
      document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }, { onlyOnce: true });
  };

  function initTorquePageData() {
    onValue(ref(db, 'torque_v46_settings'), (snapshot) => {
      window.torqueFullSettings = snapshot.val() || {};
      
      const tqFactorySelect = document.getElementById('tqFactorySelect');
      const savedFactoryVal = tqFactorySelect ? tqFactorySelect.value : "";
      
      const fTqFactory = document.getElementById('fTqFactory');
      const savedFilterFactoryVal = fTqFactory ? fTqFactory.value : "";

      const factories = Object.keys(window.torqueFullSettings);

      if(tqFactorySelect) {
        tqFactorySelect.innerHTML = factories.map(f => `<option value="${f}">${f}</option>`).join('');
        if(savedFactoryVal && factories.includes(savedFactoryVal)) {
          tqFactorySelect.value = savedFactoryVal;
        }
      }

      if(fTqFactory) {
        fTqFactory.innerHTML = '<option value="">所有廠區</option>' + factories.map(f => `<option value="${f}">${f}</option>`).join('');

          fTqFactory.value = savedFilterFactoryVal;
        }
      }

      updateTqWorkerAndCheckerDropdowns();
      updateTqFilterDropdowns();
      renderTorqueAdminConfigHTML();

      document.getElementById('newTqFactoryName').value = '';

  window.updateTqWorkerAndCheckerDropdowns = () => {
    const factory = document.getElementById('tqFactorySelect').value;
    const wSelect = document.getElementById('tqWorkerSelect');
    const cSelect = document.getElementById('tqCheckerSelect');
    if(!wSelect || !cSelect) return;

    if(!factory || !window.torqueFullSettings[factory]) {
      wSelect.innerHTML = '<option value="">請先選擇廠區</option>';
      cSelect.innerHTML = '<option value="">請先選擇廠區</option>';
      return;
    }

    const config = window.torqueFullSettings[factory];
    const workersArr = (config.workers || "").split(',').map(m => m.trim()).filter(m => m);
    const checkersArr = (config.checkers || "").split(',').map(m => m.trim()).filter(m => m);

    wSelect.innerHTML = workersArr.length ? workersArr.map(m => `<option value="${m}">${m}</option>`).join('') : '<option value="">未設定作業人員</option>';
    cSelect.innerHTML = checkersArr.length ? checkersArr.map(m => `<option value="${m}">${m}</option>`).join('') : '<option value="">未設定查檢人員</option>';
  };

  window.updateTqFilterDropdowns = () => {
    const fFactory = document.getElementById('fTqFactory').value;
    const fwSelect = document.getElementById('fTqWorker');
    const fcSelect = document.getElementById('fTqChecker');
    if(!fwSelect || !fcSelect) return;

    let allWorkers = [];
    let allCheckers = [];

    if(!fFactory) {
      Object.values(window.torqueFullSettings).forEach(config => {
        (config.workers || "").split(',').forEach(m => { if(m.trim()) allWorkers.push(m.trim()); });
        (config.checkers || "").split(',').forEach(m => { if(m.trim()) allCheckers.push(m.trim()); });
      });
    } else if(window.torqueFullSettings[fFactory]) {
      const config = window.torqueFullSettings[fFactory];
      allWorkers = (config.workers || "").split(',').map(m => m.trim()).filter(m => m);
      allCheckers = (config.checkers || "").split(',').map(m => m.trim()).filter(m => m);
    }

    allWorkers = Array.from(new Set(allWorkers));
    allCheckers = Array.from(new Set(allCheckers));

    fwSelect.innerHTML = '<option value="">所有作業人員</option>' + allWorkers.map(m => `<option value="${m}">${m}</option>`).join('');
    fcSelect.innerHTML = '<option value="">所有查檢人員</option>' + allCheckers.map(m => `<option value="${m}">${m}</option>`).join('');
  };

    const cSelect = document.getElementById(`tq_inline_checker_${key}`);

  window.renderFreshmanTable = () => {
    const container = document.getElementById('freshmanTableContainer');
    if(!container) return;

    const filterName = document.getElementById('freshmanFilter').value;
    let namesArr = window.freshmanDataCache.names.split(',').map(n => n.trim()).filter(n => n);
    const skillsArr = window.freshmanDataCache.skills.split(',').map(s => s.trim()).filter(s => s);
    const records = window.freshmanDataCache.list;

    let nameObjects = namesArr.map(name => {
      let maxJoinDate = "0000-00-00"; 
      let factoryVal = "";
      let checkerVal = "";

      skillsArr.forEach(sk => {
        const key = `${name}__${sk}`;
        if(records[key]) {
          if(records[key].joinDate && records[key].joinDate > maxJoinDate) maxJoinDate = records[key].joinDate;
          if(records[key].factory) factoryVal = records[key].factory;
          if(records[key].checker) checkerVal = records[key].checker;
        }
      });
      return { name, joinDate: maxJoinDate, factory: factoryVal, checker: checkerVal };
    });

    nameObjects.sort((a, b) => {
      if(a.joinDate === "0000-00-00" && b.joinDate !== "0000-00-00") return 1;
      if(b.joinDate === "0000-00-00" && a.joinDate !== "0000-00-00") return -1;
      return b.joinDate.localeCompare(a.joinDate);
    });

    if(filterName) {
      nameObjects = nameObjects.filter(obj => obj.name === filterName);
    }

    onValue(ref(db, 'torque_v46_settings'), (factSnap) => {
      const factoryList = Object.keys(factSnap.val() || {});

      let html = `<table class="skill-table">

          <th style="width: 180px; text-align:center; background:#cbd5e1;">進場日期</th>

      if(nameObjects.length === 0) {
        html += `<tr><td colspan="${skillsArr.length + 5}" style="text-align:center; color:#94a3b8;">目前尚無設定新人名單數據。</td></tr>`;
      } else {
        nameObjects.forEach(obj => {
          const name = obj.name;
          const displayJoinDate = obj.joinDate === "0000-00-00" ? "" : obj.joinDate;

          html += `<tr>
            <td style="text-align:center; background:#f8fafc; color:#000;">👤 <b>${name}</b></td>
            <td><input type="date" id="cell_join_${name}" class="table-input" style="padding:4px; font-size:20px;" value="${displayJoinDate}"></td>
            <td>
              <select id="cell_factory_${name}" class="table-input" style="padding:4px; font-size:20px; text-align:center;">
                <option value="">未填廠區</option>
                ${factoryList.map(f => `<option value="${f}" ${obj.factory===f?'selected':''}>${f}</option>`).join('')}
              </select>
            </td>`;
            
            skillsArr.forEach(sk => {
              const key = `${name}__${sk}`;
              const curRec = records[key] || {};
              const dVal = curRec.doneDate || "";
              
              const cellStyle = dVal ? "background-color: #dcfce7;" : "background-color: #ffe4e6; color: #ff0000;";

              html += `<td style="${cellStyle}">
                <input type="date" id="cell_done_${name}__${sk}" class="table-input" style="padding:4px; font-size:20px; ${cellStyle}" value="${dVal}">
              </td>`;
            });

            html += `
            <td><input type="text" id="cell_check_${name}" class="table-input" style="padding:4px; font-size:20px; text-align:center;" value="${obj.checker || ''}" placeholder="填寫考核人"></td>

            </td>
          </tr>`;
        });
      }

      html += `</table>`;
      container.innerHTML = html;
    }, { onlyOnce: true });
  };

      const fEduWorker = document.getElementById('fEduWorker');

  window.saveTrainingRecord = () => {
    const factory = document.getElementById('eduFactory').value;
    const course = document.getElementById('eduCourse').value.trim();
    const date = document.getElementById('eduDate').value;
    const teacher = document.getElementById('eduTeacher').value.trim();
    const workersRaw = document.getElementById('eduWorkers').value.trim();
    const photoFile = document.getElementById('eduPhotoFile').files[0];

    if(!factory || !course || !date || !teacher || !workersRaw) {
      alert("⚠️ 請完整填寫：廠區、課程名稱、訓練日期、訓練講師與訓練人員名單！");
      return;
    }

    const workersArray = workersRaw.split(',').map(w => w.trim()).filter(Boolean);
    const existingPhoto = window.currentEditEduPhotoBase64 || "";

    const doSaveEdu = (compressedB64) => {
      if (window.currentEditEduKey) {
        // 單筆資料修改
        const key = window.currentEditEduKey;
        set(ref(db, `training_records/${key}`), {
          key: parseInt(key), factory, course, date, teacher, workers: workersRaw, photo: compressedB64 || existingPhoto || ""
        }).then(() => {
          alert("🎉 教育訓練紀錄修改成功並同步發送至雲端！");
          clearTrainingInputs();
        }).catch(err => alert("同步雲端失敗: " + err));
      } else {
        // 多人名單建立與批次拆分獨立儲存
        let promises = workersArray.map((worker, index) => {
          const key = Date.now() + index;
          return set(ref(db, `training_records/${key}`), {
            key: key, factory, course, date, teacher, workers: worker, photo: compressedB64 || ""
          });
        });
        Promise.all(promises).then(() => {
          alert(`🎉 成功建立並拆分為 ${workersArray.length} 筆獨立教育訓練紀錄！`);
          clearTrainingInputs();
        }).catch(err => alert("同步雲端失敗: " + err));
      }
    };

    if(photoFile) { compressImg(photoFile, (b64) => { doSaveEdu(b64); }); } else { doSaveEdu(null); }
  };

  window.renderTrainingList = () => {
    const listArea = document.getElementById('trainingListArea');
    if(!listArea) return;

    const fFactory = document.getElementById('fEduFactory').value;
    const fCourse = document.getElementById('fEduCourse').value;
    const fDate = document.getElementById('fEduDate').value;
    const fWorker = document.getElementById('fEduWorker').value;
    const fTeacher = document.getElementById('fEduTeacher').value;

    onValue(ref(db, 'training_records'), (snapshot) => {
      const rawData = snapshot.val() || {};
      let dataArray = [];
      for(let k in rawData) { dataArray.push(rawData[k]); }
      dataArray.sort((a, b) => b.key - a.key);

      let filtered = dataArray.filter(item => {
        if(fFactory && item.factory !== fFactory) return false;
        if(fCourse && item.course !== fCourse) return false;
        if(fDate && item.date !== fDate) return false;
        if(fTeacher && item.teacher !== fTeacher) return false;
        if(fWorker) {
          const arr = (item.workers || "").split(',').map(w => w.trim());
          if(!arr.includes(fWorker)) return false;
        }
        return true;
      });

      let html = `<table class="skill-table">
        <tr>
          <th style="width: 12%; text-align:center;">廠區</th>
          <th style="text-align:left;">訓練人員</th>
          <th style="width: 20%; text-align:left;">課程名稱</th>
          <th style="width: 13%; text-align:center;">訓練日期</th>
          <th style="width: 13%; text-align:center;">訓練講師</th>
          <th style="width: 8%; text-align:center;">照片</th>
          <th style="width: 12%; text-align:center;">操作功能</th>
        </tr>`;

      if(filtered.length === 0) {
        html += `<tr><td colspan="7" style="text-align:center; color:#94a3b8;">目前尚無符合篩選條件的訓練紀錄。</td></tr>`;
      } else {
        filtered.forEach(item => {
          const k = item.key;
          const photoBtnClass = item.photo ? "btn-action btn-has-photo" : "btn-action";
          
          let fOptions = [...window.eduFactoryList];
          if(item.factory && !fOptions.includes(item.factory)) fOptions.push(item.factory);
          let selectHtml = `<select id="edu_inline_factory_${k}" class="table-input" style="padding:2px; text-align:center;">` + fOptions.map(f => `<option value="${f}" ${item.factory===f?'selected':''}>${f}</option>`).join('') + `</select>`;

          html += `<tr style="background:#ffffff;">
            <td>${selectHtml}</td>
            <td><input type="text" id="edu_inline_workers_${k}" class="table-input" value="${item.workers || ''}"></td>
            <td><input type="text" id="edu_inline_course_${k}" class="table-input" value="${item.course || ''}"></td>
            <td><input type="date" id="edu_inline_date_${k}" class="table-input" style="text-align:center;" value="${item.date || ''}"></td>
            <td><input type="text" id="edu_inline_teacher_${k}" class="table-input" style="text-align:center;" value="${item.teacher || ''}"></td>
            <td style="text-align:center;">
              ${item.photo ? `<button class="${photoBtnClass}" style="padding:6px 12px; font-size:20px;" onclick="viewImg('${item.photo}')">📷</button>` : '<span style="font-size:18px;color:#94a3b8;">無</span>'}
              <input type="file" id="edu_inline_file_${k}" accept="image/*" style="font-size:11px; width:100%; margin-top:5px; padding:0; border:none; background:transparent;">
            </td>
            <td style="text-align:center;">
              <button class="btn-action btn-action-sm" style="background:#86efac; display:block; width:95%; margin:3px auto;" onclick="saveInlineTraining('${k}', '${item.photo || ''}')" title="格子直改儲存">💾 儲存</button>
              <button class="btn-action btn-action-sm" style="background:#fde047; display:block; width:95%; margin:3px auto;" onclick="loadToTopTrainingEditor('${k}', '${item.factory || ''}', \`${item.course}\`, '${item.date}', \`${item.teacher}\`, \`${item.workers}\`, '${item.photo || ''}')" title="回填上方控制台">✏️ 修改</button>
              <button class="btn-action btn-action-sm" style="background:#fca5a5; display:block; width:95%; margin:3px auto;" onclick="deleteTrainingRecord('${k}')" title="永久刪除">🗑️</button>
            </td>
          </tr>`;
        });
      }

      html += `</table>`;
      listArea.innerHTML = html;
    });
  };

  window.saveInlineTraining = (key, existingPhoto) => {
    const uFactory = document.getElementById(`edu_inline_factory_${key}`).value;
    const uCourse = document.getElementById(`edu_inline_course_${key}`).value.trim();
    const uDate = document.getElementById(`edu_inline_date_${key}`).value;
    const uTeacher = document.getElementById(`edu_inline_teacher_${key}`).value.trim();
    const uWorkers = document.getElementById(`edu_inline_workers_${key}`).value.trim();
    const fileEl = document.getElementById(`edu_inline_file_${key}`).files[0];

    if(!uFactory || !uCourse || !uDate || !uTeacher || !uWorkers) { alert("各欄位內容不允許留空！"); return; }

    const performEduUpdate = (b64) => {
      set(ref(db, `training_records/${key}`), {
        key: parseInt(key), factory: uFactory, course: uCourse, date: uDate, teacher: uTeacher, workers: uWorkers, photo: b64 || existingPhoto || ""
      }).then(() => {
        alert("🎉 教育訓練格子直改成功！雲端數據已更新同步！");
        renderTrainingList();
      }).catch(err => alert("更新失敗: " + err));
    };

    if(fileEl) { compressImg(fileEl, (compressed) => { performEduUpdate(compressed); }); } else { performEduUpdate(null); }
  };

  window.loadToTopTrainingEditor = (key, factory, course, date, teacher, workers, photo) => {
    window.currentEditEduKey = key;
    window.currentEditEduPhotoBase64 = photo;

    document.getElementById('eduFactory').value = factory || "";
    document.getElementById('eduCourse').value = course;
    document.getElementById('eduDate').value = date;
    document.getElementById('eduTeacher').value = teacher;
    document.getElementById('eduWorkers').value = workers;

    alert("📍 資料已成功載入至最上方控制台！");
  };

  window.deleteTrainingRecord = (key) => {
    if(confirm("確定要永久刪除此筆教育訓練紀錄嗎？")) {
      remove(ref(db, `training_records/${key}`)).then(() => { alert("資料已成功自雲端刪除！"); renderTrainingList(); });
    }
  };

// 匯出 Excel (使用 Tab 分隔格式，保證不亂碼)
  window.downloadTrainingCSV = () => {
    const fFactory = document.getElementById('fEduFactory').value;
    const fCourse = document.getElementById('fEduCourse').value;
    const fDate = document.getElementById('fEduDate').value;
    const fWorker = document.getElementById('fEduWorker').value;
    const fTeacher = document.getElementById('fEduTeacher').value;

    onValue(ref(db, 'training_records'), (snapshot) => {
      const rawData = snapshot.val() || {};
      let dataArray = [];
      for(let k in rawData) { dataArray.push(rawData[k]); }
      dataArray.sort((a, b) => b.key - a.key);

      let filteredData = dataArray.filter(item => {
        if(fFactory && item.factory !== fFactory) return false;
        if(fCourse && item.course !== fCourse) return false;
        if(fDate && item.date !== fDate) return false;
        if(fTeacher && item.teacher !== fTeacher) return false;
        if(fWorker) {
          const arr = (item.workers || "").split(',').map(w => w.trim());
          if(!arr.includes(fWorker)) return false;
        }
        return true;
      });

      if(filteredData.length === 0) { alert('目前無符合篩選條件的教育訓練資料可供匯出！'); return; }

      // 建立內容，使用 "\t" (Tab) 分隔資料，Excel 比較不會亂碼
      let content = "\uFEFF" + "廠區\t訓練人員\t課程名稱\t訓練日期\t訓練講師\n";
      
      // 填入資料行
      filteredData.forEach((rowObj) => {
        let row = [
          rowObj.factory || '',
          rowObj.workers || '',
          rowObj.course || '',
          rowObj.date || '',
          rowObj.teacher || ''
        ].map(text => `"${String(text).replace(/"/g, '""')}"`).join("\t");
        content += row + "\n";
      });

      // 產生檔案，副檔名改成 .xls
      const blob = new Blob([content], { type: 'application/vnd.ms-excel;charset=utf-8;' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.setAttribute("download", `教育訓練紀錄報表_${Date.now()}.xls`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }, { onlyOnce: true });
  };
</script>
</body>
</html>
