<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>連線測試</title>
</head>
<body>
  <h2>Firebase 文字上傳測試</h2>
  <input type="text" id="testText" placeholder="請輸入組長名稱">
  <button id="sendBtn">上傳文字</button>
  <p id="status">等待操作...</p>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAPBXphipNLgAHuqPg0HZ-J8HIqc9hQHc",
      authDomain: "employee-review-system-4a32d.firebaseapp.com",
      databaseURL: "https://employee-review-system-4a32d-default-rtdb.firebaseio.com",
      projectId: "employee-review-system-4a32d",
      storageBucket: "employee-review-system-4a32d.appspot.com",
      messagingSenderId: "855967203605",
      appId: "1:855967203605:web:b80727517c38b28229291c"
    };

    const db = getDatabase(initializeApp(firebaseConfig));
    const status = document.getElementById('status');

    document.getElementById('sendBtn').onclick = () => {
      const val = document.getElementById('testText').value;
      if (!val) return alert('請輸入文字');
      
      status.innerText = "正在上傳...";
      set(ref(db, 'test_text'), val)
        .then(() => status.innerText = "成功！請去 Firebase 確認")
        .catch(err => status.innerText = "錯誤: " + err.message);
    };
  </script>
</body>
</html>
