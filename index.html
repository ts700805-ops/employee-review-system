<!DOCTYPE html>
<html>
<head>
    <title>Firebase 上傳測試</title>
</head>
<body>
    <h2>Firebase 圖片上傳測試</h2>
    <input type="file" id="testInput" accept="image/*">
    <button onclick="testUpload()">執行上傳測試</button>
    <p id="status">狀態：等待操作...</p>
    <img id="testImg" style="width:200px; margin-top:20px;">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // 請在此填入您的真實 Firebase Config
        const firebaseConfig = {
            // ... 請填入您的 apiKey, databaseURL 等設定 ...
        };

        const db = getDatabase(initializeApp(firebaseConfig));
        window.db = db; window.ref = ref; window.set = set;

        // 監聽測試節點，確認資料是否真的寫進去了
        onValue(ref(db, 'test_image'), (snapshot) => {
            if(snapshot.val()) {
                document.getElementById('testImg').src = snapshot.val();
                document.getElementById('status').innerText = '狀態：成功從雲端讀取資料！';
            }
        });
    </script>

    <script>
        function testUpload() {
            const file = document.getElementById('testInput').files[0];
            if(!file) return alert('請先選擇檔案');
            
            const reader = new FileReader();
            reader.onload = e => {
                window.set(window.ref(window.db, 'test_image'), e.target.result)
                .then(() => document.getElementById('status').innerText = '狀態：上傳指令已發送...')
                .catch(err => document.getElementById('status').innerText = '錯誤：' + err.message);
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
