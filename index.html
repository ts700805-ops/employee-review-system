<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>員工評核系統</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    // --- 請貼上您 Firebase 的設定代碼 ---
    const firebaseConfig = {
      // 貼上您的配置內容
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window.db = db;
    window.ref = ref;
    window.set = set;

    // 自動同步資料
    onValue(ref(db, 'appData'), (snapshot) => {
        const data = snapshot.val() || {};
        window.masterData = data.teamData || {};
        if(data.homepagePhoto) {
            const img = document.getElementById('display-avatar');
            img.src = data.homepagePhoto;
            img.style.display = 'block';
        }
        if(typeof updateUI === 'function') updateUI();
    });
  </script>
  <style>
    :root { --primary-color: #0a3d2e; --secondary-color: #d4af37; --bg-color: #e8f5e9; }
    body { margin: 0; display: flex; height: 100vh; background-color: var(--bg-color); font-family: sans-serif; }
    .sidebar { width: 260px; background-color: var(--primary-color); color: white; }
    .sidebar-menu li { padding: 18px 25px; cursor: pointer; }
    .sidebar-menu li.active { background-color: rgba(255,255,255,0.2); color: var(--secondary-color); }
    .main-content { flex: 1; padding: 40px; overflow-y: auto; }
    .page { display: none; } .page.active { display: block; }
    .card { background: white; padding: 35px; border-radius: 15px; margin-bottom: 20px; }
    .btn { background-color: var(--primary-color); color: white; border: none; padding: 10px 20px; cursor: pointer; }
    .edit-textarea { width: 90%; height: 60px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2 style="padding:40px 20px">端午佳節</h2>
    <ul class="sidebar-menu" id="menu">
      <li id="menu-home" class="active" onclick="showPage('home')">🏠 首頁</li>
      <li id="menu-eval" onclick="showPage('eval')">📝 員工評核表</li>
      <li id="menu-admin" onclick="showPage('admin')">⚙️ 管理後台</li>
    </ul>
  </div>
  <div class="main-content">
    <div id="page-home" class="page active"><div class="card"><h1>首頁</h1><img id="display-avatar" style="width:100%; display:none;"></div></div>
    <div id="page-eval" class="page"><div class="card"><h1>評核表內容</h1></div></div>
    <div id="page-admin" class="page">
      <div class="card">
        <h3>📷 照片管理</h3>
        <input type="file" id="photoUploader" accept="image/*">
        <button class="btn" onclick="uploadPhoto()">儲存照片</button>
      </div>
      <div class="card">
        <h3>👥 員工名單管理</h3>
        <input type="text" id="adminLeaderName" placeholder="組長名稱"><br><br>
        <textarea id="adminMemberList" placeholder="組員名單(逗號分隔)"></textarea><br><br>
        <button class="btn" onclick="addTeam()">新增員工配置</button>
        <table class="data-table" id="teamTable" style="width:100%; margin-top:20px;">
            <thead><tr><th>組長</th><th>組員名單</th><th>操作</th></tr></thead>
            <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
  <script>
    window.masterData = {};
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.sidebar-menu li').forEach(l => l.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.getElementById('menu-' + pageId).classList.add('active');
    }
    function uploadPhoto() {
        const file = document.getElementById('photoUploader').files[0];
        const reader = new FileReader();
        reader.onload = e => set(ref(window.db, 'appData/homepagePhoto'), e.target.result);
        reader.readAsDataURL(file);
    }
    function addTeam() {
        const leader = document.getElementById('adminLeaderName').value;
        const members = document.getElementById('adminMemberList').value;
        window.masterData[leader] = members;
        set(ref(window.db, 'appData/teamData'), window.masterData);
    }
    function updateUI() {
        const tbody = document.querySelector('#teamTable tbody'); tbody.innerHTML = '';
        for (const leader in window.masterData) {
            tbody.innerHTML += `<tr><td>${leader}</td><td><textarea id="edit_${leader}" class="edit-textarea">${window.masterData[leader]}</textarea></td><td><button class="btn" onclick="saveRow('${leader}')">儲存</button></td></tr>`;
        }
    }
    function saveRow(leader) {
        window.masterData[leader] = document.getElementById('edit_' + leader).value;
        set(ref(window.db, 'appData/teamData'), window.masterData);
        alert('已更新');
    }
  </script>
</body>
</html>
