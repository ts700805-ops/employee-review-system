<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>員工評核系統</title>
  <style>
    :root { --primary-color: #0a3d2e; --secondary-color: #d4af37; --bg-color: #fffbf0; --text-color: #333; }
    body { margin: 0; padding: 0; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; height: 100vh; overflow: hidden; }
    /* 側邊欄保持高層級，確保可點擊 */
    .sidebar { width: 260px; background-color: var(--primary-color); color: white; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.3); z-index: 1000; }
    .sidebar-header { padding: 40px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-header h2 { margin: 0; font-size: 22px; color: var(--secondary-color); letter-spacing: 2px; }
    .sidebar-menu { list-style: none; padding: 0; margin: 20px 0 0 0; }
    .sidebar-menu li { padding: 18px 25px; cursor: pointer; display: flex; align-items: center; font-size: 16px; font-weight: 500; border-left: 4px solid transparent; transition: all 0.3s ease; }
    .sidebar-menu li:hover { background-color: rgba(255,255,255,0.05); color: var(--secondary-color); }
    .sidebar-menu li.active { background-color: rgba(255,255,255,0.1); color: var(--secondary-color); border-left-color: var(--secondary-color); }
    
    .main-content { flex: 1; padding: 40px; overflow-y: auto; position: relative; }
    .page { display: none; }
    .page.active { display: block; }
    .card { background: white; border-radius: 15px; padding: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(212, 175, 55, 0.2); max-width: 1000px; margin: 0 auto; }
    h1 { color: var(--primary-color); margin-top: 0; margin-bottom: 30px; font-size: 28px; }
    
    /* 調整照片容器，使其更寬大符合您的紅框需求 */
    .welcome-image-container { width: 100%; min-height: 500px; margin: 0 auto 30px auto; border-radius: 12px; border: 3px solid var(--secondary-color); background-color: #f0f0f0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .welcome-image { max-width: 100%; height: auto; display: block; }
    
    .form-group { margin-bottom: 25px; }
    .form-control { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    .btn { background-color: var(--primary-color); color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; width: 100%; }
    .data-table { width: 100%; border-collapse: collapse; margin-top: 30px; }
    .data-table th, .data-table td { padding: 15px 20px; text-align: left; border-bottom: 1px solid #eee; }
    .data-table th { background-color: var(--primary-color); color: white; }
    .btn-delete { background-color: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    .upload-box { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 2px dashed var(--secondary-color); margin-bottom: 25px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header"><h2>端午佳節</h2></div>
    <ul class="sidebar-menu">
      <li id="menu-home" class="active" onclick="showPage('home')">🏠 首頁</li>
      <li id="menu-eval" onclick="showPage('eval')">📝 員工評核表</li>
      <li id="menu-admin" onclick="showPage('admin')">⚙️ 管理後台</li>
    </ul>
  </div>
  <div class="main-content">
    <div id="page-home" class="page active">
      <div class="card">
        <h1>端午種子培育計畫</h1>
        <div class="welcome-image-container">
          <img id="display-avatar" class="welcome-image" src="" alt="請上傳照片" style="display:none;">
          <span id="upload-tip">【請至管理後台點選上傳照片】</span>
        </div>
      </div>
    </div>
    <div id="page-eval" class="page">
      <div class="card">
        <h1>員工績效評核</h1>
        <form id="evalForm" onsubmit="event.preventDefault();">
          <div class="form-group"><label>選擇組長</label><select id="leaderSelect" class="form-control" onchange="syncMembers()"><option value="">請選擇組長</option></select></div>
          <div class="form-group"><label>選擇組員</label><select id="memberSelect" class="form-control"><option value="">請選擇組員</option></select></div>
        </form>
      </div>
    </div>
    <div id="page-admin" class="page">
      <div class="card">
        <h1>管理後台</h1>
        <div class="upload-box"><input type="file" id="photoUploader" accept="image/*" onchange="loadLocalImage(this)"></div>
        <div class="form-group"><label>組長名稱</label><input type="text" id="adminLeaderName" class="form-control"></div>
        <div class="form-group"><label>組員名單 (逗號分隔)</label><textarea id="adminMemberList" class="form-control"></textarea></div>
        <button class="btn" onclick="saveToData()">儲存配置</button>
        <table class="data-table" id="teamTable"><thead><tr><th>組長</th><th>組員名單</th><th>操作</th></tr></thead><tbody></tbody></table>
      </div>
    </div>
  </div>
  <script>
    let masterData = {};
    // 初始化：檢查是否有儲存的照片
    window.onload = function() {
        const savedImage = localStorage.getItem('homepagePhoto');
        if (savedImage) {
            const img = document.getElementById('display-avatar');
            img.src = savedImage;
            img.style.display = 'block';
            document.getElementById('upload-tip').style.display = 'none';
        }
    };
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.sidebar-menu li').forEach(l => l.classList.remove('active'));
      document.getElementById('page-' + pageId).classList.add('active');
      document.getElementById('menu-' + pageId).classList.add('active');
    }
    function loadLocalImage(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          localStorage.setItem('homepagePhoto', e.target.result); // 存入瀏覽器儲存空間
          const img = document.getElementById('display-avatar');
          img.src = e.target.result;
          img.style.display = 'block';
          document.getElementById('upload-tip').style.display = 'none';
        }
        reader.readAsDataURL(input.files[0]);
      }
    }
    function saveToData() {
      const leader = document.getElementById('adminLeaderName').value.trim();
      const members = document.getElementById('adminMemberList').value.split(',').map(m => m.trim()).filter(m => m);
      if (!leader || members.length === 0) return alert('請完整填寫！');
      masterData[leader] = members;
      updateUI();
    }
    function updateUI() {
      const tbody = document.querySelector('#teamTable tbody'); tbody.innerHTML = '';
      const leaderSelect = document.getElementById('leaderSelect'); leaderSelect.innerHTML = '<option value="">請選擇組長</option>';
      for (const leader in masterData) {
        tbody.innerHTML += `<tr><td>${leader}</td><td>${masterData[leader].join(', ')}</td><td><button class="btn-delete" onclick="deleteTeam('${leader}')">刪除</button></td></tr>`;
        leaderSelect.innerHTML += `<option value="${leader}">${leader}</option>`;
      }
    }
    function deleteTeam(leader) { if(confirm('確定要刪除嗎？')) { delete masterData[leader]; updateUI(); } }
    function syncMembers() {
      const leader = document.getElementById('leaderSelect').value;
      const memberSelect = document.getElementById('memberSelect');
      memberSelect.innerHTML = '<option value="">請選擇組員</option>';
      if (leader && masterData[leader]) {
        masterData[leader].forEach(m => memberSelect.innerHTML += `<option value="${m}">${m}</option>`);
      }
    }
  </script>
</body>
</html>
