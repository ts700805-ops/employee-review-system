<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>員工評核系統</title>
  <style>
    /* 這裡放您原本的 CSS */
    body { font-family: sans-serif; padding: 20px; }
    .card { border: 1px solid #ccc; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
    .btn { padding: 10px 20px; cursor: pointer; background: #0a3d2e; color: white; border: none; }
  </style>
</head>
<body>

  <div class="card">
    <h3>📷 照片管理</h3>
    <input type="file" id="photoInput" accept="image/*">
    <button class="btn" onclick="uploadPhoto()">更新首頁照片</button>
  </div>

  <div class="card">
    <h3>👥 員工名單管理</h3>
    <input type="text" id="leaderName" placeholder="組長名稱">
    <textarea id="memberList" placeholder="組員名單(逗號分隔)"></textarea>
    <button class="btn" onclick="addTeam()">新增員工配置</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAPBXphipNLgAHuqPg0HZ-J8HIqc9hQHc",
      authDomain: "employee-review-system-4a32d.firebaseapp.com",
      databaseURL: "https://employee-review-system-4a32d-default-rtdb.firebaseio.com",
      projectId: "employee-review-system-4a32d",
      storageBucket: "employee-review-system-4a32d.appspot.com",
      messagingSenderId: "855967203605",
      appId: "1:855967203605:web:b80727517c38b28229291c"
    };

    const db = getDatabase(initializeApp(firebaseConfig));
    
    // 將功能掛載到 window，讓 HTML 可以呼叫
    window.uploadPhoto = () => {
      const file = document.getElementById('photoInput').files[0];
      if(!file) return alert('請選擇檔案');
      const reader = new FileReader();
      reader.onload = e => {
        set(ref(db, 'homepage/photo'), e.target.result)
          .then(() => alert('照片更新成功！'))
          .catch(err => alert('失敗: ' + err.message));
      };
      reader.readAsDataURL(file);
    };

    window.addTeam = () => {
      const leader = document.getElementById('leaderName').value;
      const members = document.getElementById('memberList').value;
      if(!leader || !members) return alert('請填寫完整');
      set(ref(db, 'teams/' + leader), members)
        .then(() => alert('員工配置成功！'))
        .catch(err => alert('失敗: ' + err.message));
    };
  </script>
</body>
</html>
