<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>員工評核系統</title>
  <style>
    body { font-family: sans-serif; display: flex; margin: 0; background: #f4f7f6; }
    nav { width: 220px; background: #0a3d2e; color: white; height: 100vh; padding: 20px; }
    nav div { padding: 15px; cursor: pointer; border-bottom: 1px solid #1a5e4d; }
    nav div:hover { background: #1a5e4d; }
    main { flex: 1; padding: 30px; }
    .card { background: white; padding: 25px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .btn { padding: 10px 20px; cursor: pointer; background: #0a3d2e; color: white; border: none; border-radius: 5px; }
    input, select { padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; width: 100%; max-width: 300px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
    .version { font-size: 12px; color: #888; margin-bottom: 20px; }
    hr { margin: 20px 0; border: 0; border-top: 1px solid #eee; }
  </style>
</head>
<body>

<nav>
  <div class="version">版本: 20260531-09</div>
  <div onclick="showPage('home')">🏠 首頁</div>
  <div onclick="showPage('skills')">📊 技能總表</div>
  <div onclick="showPage('admin')">⚙️ 管理後台</div>
</nav>

<main id="content"></main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const db = getDatabase(initializeApp({
    apiKey: "AIzaSyAPBXphipNLgAHuqPg0HZ-J8HIqc9hQHc",
    databaseURL: "https://employee-review-system-4a32d-default-rtdb.firebaseio.com",
    projectId: "employee-review-system-4a32d"
  }));

  window.showPage = (page) => {
    const content = document.getElementById('content');
    if (page === 'home') {
      content.innerHTML = `<h1>首頁</h1><img id="displayImg" style="max-width:100%;" src="">`;
      onValue(ref(db, 'homepage/photo'), (s) => {
        const img = document.getElementById('displayImg');
        if(img) img.src = s.val() || '';
      });
    } else if (page === 'admin') {
      content.innerHTML = `
        <div class="card">
          <h3>📷 照片管理</h3>
          <input type="file" id="photoInput" accept="image/*"><br>
          <button class="btn" onclick="uploadPhoto()">更新首頁照片</button>
        </div>
        <div class="card">
          <h3>👥 員工配置</h3>
          <input type="text" id="ln" placeholder="組長名稱"><br>
          <input type="text" id="ml" placeholder="組員名稱(逗號分隔)"><br>
          <button class="btn" onclick="addTeam()">儲存組別</button>
          <hr>
          <div id="teamList"></div>
        </div>
        <div class="card">
          <h3>🛠️ 技能設定</h3>
          <p>請先選擇組長以編輯該組技能：</p>
          <select id="sLeaderSelect" onchange="updateMemberSelect()"><option value="">選擇組長</option></select><br>
          <select id="sMemberSelect"><option value="">請先選擇組長</option></select><br>
          <input type="text" id="sName" placeholder="技能名稱(逗號分隔)"><br>
          <button class="btn" onclick="addSkill()">新增技能</button>
          <hr>
          <div id="skillEditArea"></div>
        </div>`;
      renderTeams();
      loadLeaders();
    } else {
      content.innerHTML = `
        <h1>📊 技能總表</h1>
        <p>請選擇組長過濾人員：</p>
        <select id="leaderFilter" onchange="renderSkills()"><option value="">請選擇組長</option></select>
        <div id="skillTable"></div>`;
      setupLeaderFilter();
    }
  };

  // --- 管理後台功能 ---

  function loadLeaders() {
    onValue(ref(db, 'teams'), (s) => {
      const data = s.val() || {};
      const select = document.getElementById('sLeaderSelect');
      if(select) {
        select.innerHTML = '<option value="">選擇組長</option>' + Object.keys(data).map(l => `<option value="${l}">${l}</option>`).join('');
      }
    });
  }

  window.updateMemberSelect = () => {
    const leader = document.getElementById('sLeaderSelect').value;
    const memberSelect = document.getElementById('sMemberSelect');
    if (!leader) { 
      if(memberSelect) memberSelect.innerHTML = '<option value="">請先選擇組長</option>'; 
      document.getElementById('skillEditArea').innerHTML = '';
      return; 
    }
    
    // 更新新增用的下拉選單
    onValue(ref(db, 'teams/' + leader), (s) => {
      const members = (s.val() || "").split(',');
      if(memberSelect) {
        memberSelect.innerHTML = members.map(m => `<option value="${m.trim()}">${m.trim()}</option>`).join('');
      }
    });

    // 觸發顯示該組員目前的技能編輯框 (需求15)
    renderSkillsAdminByLeader(leader);
  };

  window.uploadPhoto = () => {
    const file = document.getElementById('photoInput').files[0];
    if(!file) return alert('請選擇檔案');
    const reader = new FileReader();
    reader.onload = e => set(ref(db, 'homepage/photo'), e.target.result).then(() => alert('照片已更新'));
    reader.readAsDataURL(file);
  };

  window.addTeam = () => {
    const leader = document.getElementById('ln').value;
    const members = document.getElementById('ml').value;
    if(!leader || !members) return alert('請輸入完整資訊');
    set(ref(db, 'teams/' + leader), members).then(() => {
      alert('組別儲存成功');
      document.getElementById('ln').value = '';
      document.getElementById('ml').value = '';
    });
  };

  window.addSkill = () => {
    const l = document.getElementById('sLeaderSelect').value;
    const m = document.getElementById('sMemberSelect').value;
    const s = document.getElementById('sName').value;
    if(!l || !m || !s) { alert('請填寫完整技能資訊'); return; }
    set(ref(db, `skills/${l}/${m}`), s).then(() => {
      alert('技能已新增');
      document.getElementById('sName').value = '';
    });
  };

  function renderTeams() {
    onValue(ref(db, 'teams'), (s) => {
      const data = s.val() || {};
      const container = document.getElementById('teamList');
      if(!container) return;
      let html = `<h4>目前人員配置：</h4>`;
      for (let l in data) {
        html += `<div style="margin-bottom:10px;">
                   <strong>${l}組：</strong><br>
                   <input id="e_team_${l}" value="${data[l]}" style="width:70%; max-width:500px;"> 
                   <button class="btn" onclick="saveEditTeam('${l}')" style="padding:5px 10px;">儲存修改</button>
                 </div>`;
      }
      container.innerHTML = html;
    });
  }

  window.saveEditTeam = (l) => {
    const val = document.getElementById('e_team_' + l).value;
    set(ref(db, 'teams/' + l), val).then(() => alert('組別更新成功'));
  };

  function renderSkillsAdminByLeader(leader) {
    onValue(ref(db, `skills/${leader}`), (s) => {
      const data = s.val() || {};
      const container = document.getElementById('skillEditArea');
      if(!container) return;
      
      let html = `<h4>${leader}組 目前技能清單 (編輯框)：</h4>`;
      const keys = Object.keys(data);
      if(keys.length === 0) {
        html += `<p style="color: #888;">此組別目前尚無技能紀錄</p>`;
      } else {
        for (let m in data) {
          html += `<div style="margin-bottom:10px;">
                     <strong>${m}：</strong><br>
                     <input id="e_skill_${leader}_${m}" value="${data[m]}" style="width:70%; max-width:500px;"> 
                     <button class="btn" onclick="saveEditSkill('${leader}','${m}')" style="padding:5px 10px;">儲存</button>
                   </div>`;
        }
      }
      container.innerHTML = html;
    });
  }

  window.saveEditSkill = (l, m) => {
    const val = document.getElementById(`e_skill_${l}_${m}`).value;
    set(ref(db, `skills/${l}/${m}`), val).then(() => alert('技能更新成功'));
  };

  // --- 技能總表功能 ---

  function setupLeaderFilter() {
    onValue(ref(db, 'teams'), (s) => {
      const data = s.val() || {};
      const filter = document.getElementById('leaderFilter');
      if(filter) {
        filter.innerHTML = '<option value="">請選擇組長</option>' + Object.keys(data).map(l => `<option value="${l}">${l}</option>`).join('');
      }
    });
  }

  window.renderSkills = () => {
    const selectedLeader = document.getElementById('leaderFilter').value;
    const tableContainer = document.getElementById('skillTable');
    if (!selectedLeader) { tableContainer.innerHTML = ''; return; }
    
    onValue(ref(db, `skills/${selectedLeader}`), (s) => {
      const data = s.val() || {};
      let skillSet = new Set();
      
      // 解析該組長下所有成員的所有技能，用來當欄位
      for(let m in data) { 
        data[m].split(',').forEach(sk => {
          if(sk.trim()) skillSet.add(sk.trim());
        });
      }
      
      let skillsArray = Array.from(skillSet);
      if(skillsArray.length === 0) {
        tableContainer.innerHTML = '<p>該組別尚未設定任何技能項目。</p>';
        return;
      }

      let html = `<table><tr><th>組員</th>` + skillsArray.map(s => `<th>${s}</th>`).join('') + `</tr>`;
      
      for(let m in data) {
        const userSkillArray = data[m].split(',').map(s => s.trim());
        html += `<tr><td style="font-weight:bold;">${m}</td>` + skillsArray.map(sk => {
          let has = userSkillArray.includes(sk);
          return `<td style="font-size: 20px; color: #0a3d2e;">${has ? '✓' : ''}</td>`;
        }).join('') + `</tr>`;
      }
      tableContainer.innerHTML = html + `</table>`;
    });
  }

  // 初始化首頁
  showPage('home');
</script>
</body>
</html>
