<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>員工評核系統</title>
  <style>
    body { font-family: sans-serif; display: flex; margin: 0; background: #f4f7f6; }
    nav { width: 220px; background: #0a3d2e; color: white; height: 100vh; padding: 20px; }
    nav div { padding: 15px; cursor: pointer; border-bottom: 1px solid #1a5e4d; }
    nav div:hover { background: #1a5e4d; }
    main { flex: 1; padding: 30px; }
    .card { background: white; padding: 25px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .btn { padding: 10px 20px; cursor: pointer; background: #0a3d2e; color: white; border: none; border-radius: 5px; }
    input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    #displayImg { max-width: 100%; height: auto; border-radius: 8px; }
    .version { font-size: 12px; color: #888; margin-bottom: 20px; }
  </style>
</head>
<body>

<nav>
  <div class="version">版本: 20260531-02</div>
  <div onclick="showPage('home')">🏠 首頁</div>
  <div onclick="showPage('skills')">📊 技能總表</div>
  <div onclick="showPage('admin')">⚙️ 管理後台</div>

</nav>

<main id="content"></main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAPBXphipNLgAHuqPg0HZ-J8HIqc9hQHc",
    databaseURL: "https://employee-review-system-4a32d-default-rtdb.firebaseio.com",
    projectId: "employee-review-system-4a32d"
  };
  const db = getDatabase(initializeApp(firebaseConfig));

  window.showPage = (page) => {
    const content = document.getElementById('content');
    if (page === 'home') {
      content.innerHTML = `<h1>首頁</h1><img id="displayImg" src="">`;
      onValue(ref(db, 'homepage/photo'), (snapshot) => {
        document.getElementById('displayImg').src = snapshot.val() || '';
      });
    } else if (page === 'admin') {
      content.innerHTML = `
        <div class="card">
          <h3>📷 照片管理</h3>
          <input type="file" id="photoInput" accept="image/*">
          <button class="btn" onclick="uploadPhoto()">更新首頁照片</button>
        </div>
        <div class="card">
          <h3>👥 員工名單管理</h3>
          <input type="text" id="leaderName" placeholder="組長名稱">
          <input type="text" id="memberList" placeholder="組員名單(逗號分隔)">
          <button class="btn" onclick="addTeam()">新增員工配置</button>
          <div id="teamList"></div>
        </div>
        <div class="card">
          <h3>🛠️ 技能設定</h3>
          <input type="text" id="skillLeader" placeholder="組長名稱">
          <input type="text" id="skillMember" placeholder="組員名稱">
          <input type="text" id="skillName" placeholder="技能名稱">
          <button class="btn" onclick="addSkill()">新增技能</button>
        </div>`;
      renderTeams();
    } else if (page === 'skills') {
      content.innerHTML = `<h1>技能總表</h1><div id="skillTable"></div>`;
      renderSkills();
    }
  };

  // 基礎功能 (保持不動)
  window.uploadPhoto = () => {
    const file = document.getElementById('photoInput').files[0];
    if(!file) return alert('請選擇檔案');
    const reader = new FileReader();
    reader.onload = e => set(ref(db, 'homepage/photo'), e.target.result).then(() => alert('照片已更新！'));
    reader.readAsDataURL(file);
  };

  window.addTeam = () => {
    const leader = document.getElementById('leaderName').value;
    const members = document.getElementById('memberList').value;
    if(!leader || !members) return alert('請填寫完整');
    set(ref(db, 'teams/' + leader), members).then(() => alert('員工配置已新增！'));
  };

  window.addSkill = () => {
    const l = document.getElementById('skillLeader').value;
    const m = document.getElementById('skillMember').value;
    const s = document.getElementById('skillName').value;
    if(!l || !m || !s) return alert('請填寫完整技能資訊');
    set(ref(db, `skills/${l}/${m}`), s).then(() => alert('技能已新增！'));
  };

  function renderTeams() {
    onValue(ref(db, 'teams'), (snapshot) => {
      const data = snapshot.val() || {};
      let html = `<h4>現有員工配置：</h4>`;
      for (let leader in data) {
        html += `<div>${leader}組: <input id="edit_${leader}" value="${data[leader]}"> <button onclick="saveEdit('${leader}')">儲存</button></div>`;
      }
      document.getElementById('teamList').innerHTML = html;
    });
  }

  window.saveEdit = (leader) => {
    set(ref(db, 'teams/' + leader), document.getElementById('edit_' + leader).value).then(() => alert('已更新'));
  };

  function renderSkills() {
    onValue(ref(db, 'skills'), (snapshot) => {
      const data = snapshot.val() || {};
      let html = `<table border="1" style="width:100%; border-collapse:collapse;"><tr><th>組長</th><th>組員</th><th>技能</th></tr>`;
      for (let leader in data) {
        for (let member in data[leader]) {
          html += `<tr><td>${leader}</td><td>${member}</td><td>${data[leader][member]}</td></tr>`;
        }
      }
      html += `</table>`;
      document.getElementById('skillTable').innerHTML = html;
    });
  }

  showPage('home');
</script>
</body>
</html>
